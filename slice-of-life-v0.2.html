<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slice of Life v0.2 — ConsciousNode SoftWorks</title>
<!--
  Slice of Life v0.2
  ConsciousNode SoftWorks · 2026-06-13
  Kham Kizer · Kehai Interim

  Volumetric voxel modeler. No wireframes. No polygons.
  Build 3D models slice by slice, the way a 3D printer builds.
  Physics-native geometry — correct interiors by default. No clipping.

  v0.2 changes:
    — WebGL2 DDA ray caster (true volumetric — actual face normals, real lighting)
    — Canvas 2D isometric fallback if WebGL2 unavailable
    — Material editor (click swatch → color picker; click name → rename)
    — Slice Z-map: visual strip showing which slices have content
    — Layout fixed: min-height:0 propagation, canvas always centered
    — 3D preview fills its panel correctly

  Exports: .soli  (ConsciousNode Volumetric Solid Format v0.1)
  Compatible with: Slice Studio v0.1+ (Komorebi · ConsciousNode)

  Keyboard: Ctrl+Z/Shift+Z undo/redo · [ ] brush size
            ↑↓ or ,. navigate Z · d e r c l f tool shortcuts

  Xinu-compliant. Zero dependencies. Single file. MIT License.
-->
<style>
:root {
  --bg:    #0b0a0f;
  --bg2:   #131120;
  --bg3:   #1a1828;
  --border:#2a2640;
  --amber: #c89b4a;
  --adim:  #6a5220;
  --aglow: rgba(200,155,74,.10);
  --teal:  #4ab8c8;
  --tglow: rgba(74,184,200,.10);
  --text:  #e4dff0;
  --muted: #7a7498;
  --mono:  ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  --t:     .14s ease;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body {
  height:100%; background:var(--bg); color:var(--text);
  font-family:var(--mono); font-size:12px; overflow:hidden;
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* ── APP SHELL ─────────────────────────────────────────────── */
#app { display:flex; flex-direction:column; height:100dvh; }

/* ── HEADER ────────────────────────────────────────────────── */
header {
  display:flex; align-items:center; gap:7px; padding:6px 12px;
  background:var(--bg2); border-bottom:1px solid var(--border);
  flex-shrink:0; z-index:10;
}
.logo     { font-size:13px; font-weight:800; color:var(--amber); letter-spacing:-.2px; }
.logo-sub { font-size:8px; color:var(--muted); margin-top:1px; }
.h-sep    { width:1px; height:18px; background:var(--border); flex-shrink:0; }
.ml-auto  { margin-left:auto; }
.res-group { display:flex; align-items:center; gap:3px; }
.rl { font-size:8px; color:var(--muted); text-transform:uppercase; }
.ri {
  width:36px; background:var(--bg3); border:1px solid var(--border);
  color:var(--text); font-family:var(--mono); font-size:10px;
  padding:2px 3px; text-align:center;
}
.ri:focus { outline:none; border-color:var(--amber); }
.hbtn {
  padding:3px 8px; background:var(--bg3); border:1px solid var(--border);
  color:var(--muted); font-family:var(--mono); font-size:9px;
  cursor:pointer; transition:all var(--t); white-space:nowrap;
}
.hbtn:hover    { border-color:var(--amber); color:var(--amber); }
.hbtn.pri      { background:var(--aglow); border-color:var(--adim); color:var(--amber); }
.hbtn.pri:hover{ border-color:var(--amber); }
.hbtn.resize { border-color:var(--tdim); color:var(--teal); }
.hbtn.resize:hover { border-color:var(--teal); color:var(--teal); background:var(--tglow); }
/* model name input */
.name-in {
  background:var(--bg3); border:1px solid var(--border);
  color:var(--amber); font-family:var(--mono); font-size:11px; font-weight:700;
  padding:3px 7px; width:140px; letter-spacing:.02em;
  transition:border-color var(--t);
}
.name-in:focus { outline:none; border-color:var(--amber); }
.name-in::placeholder { color:var(--adim); font-weight:400; }

/* ── MAIN ROW ──────────────────────────────────────────────── */
/* min-height:0 is the critical fix — flex children default to min-height:auto
   which prevents them from shrinking below content size               */
.main-row {
  display:flex; flex:1; overflow:hidden; min-height:0;
}

/* ── TOOLS SIDEBAR ─────────────────────────────────────────── */
aside {
  width:172px; flex-shrink:0; background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow-y:auto; min-height:0;
}
.sec { padding:8px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sec.grow { flex:1; overflow-y:auto; }
.sec-lbl {
  font-size:7px; color:var(--muted); letter-spacing:.12em;
  text-transform:uppercase; margin-bottom:5px;
}

/* tool buttons */
.tgrid { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
.tbtn {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:5px 2px; background:var(--bg3); border:1px solid var(--border);
  color:var(--muted); font-size:7px; cursor:pointer; transition:all var(--t);
  letter-spacing:.04em;
}
.tbtn .ic { font-size:13px; line-height:1; }
.tbtn:hover  { border-color:var(--teal); color:var(--teal); }
.tbtn.active { border-color:var(--teal); color:var(--teal); background:var(--tglow); }

/* brush */
.brush-row { display:flex; align-items:center; gap:5px; }
.bval { font-size:13px; color:var(--teal); min-width:20px; text-align:center; font-weight:700; }
input[type=range] {
  flex:1; height:3px; -webkit-appearance:none; appearance:none;
  background:var(--border); border-radius:2px; outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:11px; height:11px; border-radius:50%;
  background:var(--teal); cursor:pointer;
}

/* material list */
.mlist { display:flex; flex-direction:column; gap:2px; }
.mbtn {
  display:flex; align-items:center; gap:0; padding:0;
  background:var(--bg3); border:1px solid var(--border);
  cursor:pointer; transition:border-color var(--t); position:relative;
  flex-direction:column;
}
.mbtn:hover  { border-color:var(--amber); }
.mbtn.active { border-color:var(--amber); background:var(--aglow); }
.mbtn-row { display:flex; align-items:center; gap:5px; padding:4px 5px; width:100%; }
/* color swatch as clickable color input */
.msw-label { position:relative; display:flex; flex-shrink:0; cursor:pointer; }
.msw { width:10px; height:10px; border-radius:2px; border:1px solid rgba(255,255,255,.08); display:block; }
.msw-input {
  position:absolute; top:0; left:0; width:100%; height:100%;
  opacity:0; cursor:pointer; padding:0; border:none;
}
.minfo { flex:1; min-width:0; }
.mname-in {
  font-size:9px; color:var(--text); background:transparent; border:none;
  outline:none; width:100%; font-family:var(--mono); cursor:text; padding:0;
}
.mbtn.active .mname-in { color:var(--amber); }
.mdens { font-size:7px; color:var(--muted); }

/* ── CENTER WORKSPACE ──────────────────────────────────────── */
#workspace {
  flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0;
}

/* Z-nav */
#znav {
  display:flex; align-items:center; gap:5px; padding:5px 10px;
  background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0;
}
.zlbl { font-size:8px; color:var(--muted); text-transform:uppercase; }
.zval { font-size:10px; color:var(--teal); min-width:52px; text-align:right; }
.nbtn {
  padding:2px 7px; background:var(--bg3); border:1px solid var(--border);
  color:var(--text); font-size:11px; cursor:pointer; transition:all var(--t);
}
.nbtn:hover { border-color:var(--teal); color:var(--teal); }
/* Z-map strip */
#zmap {
  display:block; width:100%; height:5px;
  image-rendering:pixelated; margin-top:3px;
  flex-shrink:0;
}

/* slice canvas wrap */
#swrap {
  flex:1; min-height:0; display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative; padding:12px;
}
#scv, #ocv {
  position:absolute;
  top:50%; left:50%; transform:translate(-50%, -50%);
  image-rendering:pixelated; cursor:crosshair;
}
#scv { pointer-events:none; }
#ocv { pointer-events:all; opacity:.8; }

/* ── 3D PREVIEW ─────────────────────────────────────────────── */
#preview {
  width:272px; flex-shrink:0; background:var(--bg2);
  border-left:1px solid var(--border); display:flex; flex-direction:column;
  min-height:0;
}
.pvhdr {
  padding:5px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
  font-size:7px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase;
  display:flex; align-items:center; justify-content:space-between;
}
#pvmode { color:var(--teal); }
#pcv {
  flex:1; width:100%; display:block; cursor:grab;
  min-height:0; image-rendering:pixelated;
}
#pcv:active { cursor:grabbing; }
.pvhint {
  padding:4px 8px; font-size:7px; color:var(--muted); text-align:center;
  border-top:1px solid var(--border); flex-shrink:0;
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div>
      <div class="logo">Slice of Life</div>
      <div class="logo-sub">ConsciousNode SoftWorks · v0.2</div>
    </div>
    <div class="h-sep"></div>
    <div class="res-group">
      <span class="rl">X</span><input type="number" class="ri" id="rx" value="32" min="4" max="128">
      <span class="rl">Y</span><input type="number" class="ri" id="ry" value="32" min="4" max="128">
      <span class="rl">Z</span><input type="number" class="ri" id="rz" value="32" min="4" max="128">
      <button class="hbtn" onclick="newScene()">NEW</button>
      <button class="hbtn resize" onclick="resizeScene()" title="Resample model to new resolution — geometry scales with it">RESIZE</button>
    </div>
    <div class="h-sep"></div>
    <button class="hbtn" id="btn-undo" onclick="undo()" disabled>↩ UNDO</button>
    <button class="hbtn" id="btn-redo" onclick="redo()" disabled>↪ REDO</button>
    <div class="h-sep ml-auto"></div>
    <input type="text" class="name-in" id="model-name" placeholder="untitled"
           maxlength="48" spellcheck="false" title="Model name — used as export filename">
    <div class="h-sep"></div>
    <button class="hbtn" onclick="importSoli()">OPEN .SOLI</button>
    <button class="hbtn pri" onclick="exportSoli()">EXPORT .SOLI</button>
  </header>

  <div class="main-row">

    <!-- TOOLS SIDEBAR -->
    <aside>
      <div class="sec">
        <div class="sec-lbl">Tool</div>
        <div class="tgrid">
          <button class="tbtn active" data-tool="draw"    onclick="setTool('draw')">    <span class="ic">✏️</span>DRAW</button>
          <button class="tbtn"        data-tool="erase"   onclick="setTool('erase')">   <span class="ic">⬜</span>ERASE</button>
          <button class="tbtn"        data-tool="rect"    onclick="setTool('rect')">    <span class="ic">▭</span>RECT</button>
          <button class="tbtn"        data-tool="circle"  onclick="setTool('circle')">  <span class="ic">◯</span>CIRCLE</button>
          <button class="tbtn"        data-tool="ellipse" onclick="setTool('ellipse')"> <span class="ic">⬯</span>ELLIPSE</button>
          <button class="tbtn"        data-tool="line"    onclick="setTool('line')">    <span class="ic">╱</span>LINE</button>
          <button class="tbtn"        data-tool="fill"    onclick="setTool('fill')">    <span class="ic">▓</span>FILL</button>
        </div>
      </div>
      <div class="sec">
        <div class="sec-lbl">Brush <span style="color:var(--teal)">[ ]</span></div>
        <div class="brush-row">
          <span class="bval" id="bval">1</span>
          <input type="range" id="bsl" min="1" max="16" value="1" oninput="setBrush(+this.value)">
        </div>
      </div>
      <div class="sec grow">
        <div class="sec-lbl">Material <span style="color:var(--muted);font-size:6px">click swatch to recolor · click name to rename</span></div>
        <div class="mlist" id="mlist"></div>
      </div>
    </aside>

    <!-- CENTER: SLICE EDITOR -->
    <div id="workspace">
      <div id="znav">
        <span class="zlbl">Z</span>
        <button class="nbtn" onclick="zStep(-1)">◀</button>
        <div style="flex:1;display:flex;flex-direction:column;gap:0">
          <input type="range" id="zsl" min="0" max="31" value="0"
                 oninput="setSlice(+this.value)" style="flex:1">
          <canvas id="zmap"></canvas>
        </div>
        <button class="nbtn" onclick="zStep(1)">▶</button>
        <span class="zval" id="zval">0 / 31</span>
        <button class="nbtn" onclick="extendZ()" title="Add 8 more Z slices (max 128)">+8Z</button>
      </div>
      <div id="swrap">
        <canvas id="scv"></canvas>
        <canvas id="ocv"></canvas>
      </div>
    </div>

    <!-- 3D PREVIEW -->
    <div id="preview">
      <div class="pvhdr">
        <span>3D PREVIEW</span>
        <span id="pvmode">WEBGL · DRAG ROTATE · SCROLL ZOOM</span>
      </div>
      <canvas id="pcv"></canvas>
      <div class="pvhint">↑↓ SLICES · [ ] BRUSH · d e r c l f TOOLS · CTRL+Z UNDO</div>
    </div>

  </div>
</div>

<input type="file" id="file-in" accept=".soli" style="display:none" onchange="loadSoli(event)">

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//  MATERIALS  (density-coded, cold→hot = light→dense)
//  Color and name are user-editable in v0.2.
// ════════════════════════════════════════════════════════════════
const MAT = [
  { name:'void',    density:0,      elast:0,    color:null        },
  { name:'gas',     density:0.001,  elast:0.95, color:'#88ccff'   },
  { name:'liquid',  density:1.000,  elast:0,    color:'#3377ff'   },
  { name:'soft',    density:0.500,  elast:0.70, color:'#55dd88'   },
  { name:'tissue',  density:1.100,  elast:0.40, color:'#ffaa55'   },
  { name:'bone',    density:1.900,  elast:0.08, color:'#eeeebb'   },
  { name:'polymer', density:1.400,  elast:0.30, color:'#bb88ff'   },
  { name:'metal',   density:7.800,  elast:0.05, color:'#8899bb'   },
  { name:'dense',   density:11.300, elast:0.02, color:'#ff5533'   },
];

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
const S = {
  RX:32, RY:32, RZ:32,
  voxels: new Uint8Array(32*32*32),
  slice:0, mat:1, tool:'draw', brush:1,
  history:[], hIdx:-1, MAX_HIST:50,
  painting:false, shapeStart:null, lastPt:null,
  rotY: Math.PI / 5,
  rotX: Math.PI / 8,  // slight downward tilt default
  zoom: 1.0,
  name: '',
};

// ════════════════════════════════════════════════════════════════
//  VOXEL ACCESS
// ════════════════════════════════════════════════════════════════
const VI  = (x,y,z) => z*S.RX*S.RY + y*S.RX + x;
const inB = (x,y,z) => x>=0&&x<S.RX&&y>=0&&y<S.RY&&z>=0&&z<S.RZ;
const getV  = (x,y,z) => inB(x,y,z) ? S.voxels[VI(x,y,z)] : 0;
const setV  = (x,y,z,m) => { if(inB(x,y,z)) S.voxels[VI(x,y,z)] = m; };

// ════════════════════════════════════════════════════════════════
//  HISTORY
// ════════════════════════════════════════════════════════════════
function pushHist() {
  S.history.splice(S.hIdx + 1);
  S.history.push(S.voxels.slice());
  if (S.history.length > S.MAX_HIST) S.history.shift();
  S.hIdx = S.history.length - 1;
  updUndo();
}
function undo() {
  if (S.hIdx <= 0) return;
  S.voxels.set(S.history[--S.hIdx]);
  renderAll(); updUndo();
}
function redo() {
  if (S.hIdx >= S.history.length - 1) return;
  S.voxels.set(S.history[++S.hIdx]);
  renderAll(); updUndo();
}
function updUndo() {
  document.getElementById('btn-undo').disabled = S.hIdx <= 0;
  document.getElementById('btn-redo').disabled = S.hIdx >= S.history.length - 1;
}

// ════════════════════════════════════════════════════════════════
//  DRAWING PRIMITIVES
// ════════════════════════════════════════════════════════════════
function brushAt(vx, vy, mat) {
  const b = S.brush, h = Math.floor(b / 2);
  for (let dy = -h; dy < b - h; dy++)
    for (let dx = -h; dx < b - h; dx++)
      setV(vx + dx, vy + dy, S.slice, mat);
}
function drawLine(x0, y0, x1, y1, mat) {
  let dx=Math.abs(x1-x0), dy=Math.abs(y1-y0),
      sx=x0<x1?1:-1, sy=y0<y1?1:-1, err=dx-dy, x=x0, y=y0;
  for(;;) {
    brushAt(x, y, mat);
    if (x===x1 && y===y1) break;
    const e2=2*err;
    if (e2>-dy){err-=dy;x+=sx;}
    if (e2< dx){err+=dx;y+=sy;}
  }
}
function drawRect(x0, y0, x1, y1, mat) {
  const lx=Math.min(x0,x1), gx=Math.max(x0,x1);
  const ly=Math.min(y0,y1), gy=Math.max(y0,y1);
  for (let y=ly; y<=gy; y++) for (let x=lx; x<=gx; x++) setV(x,y,S.slice,mat);
}
function drawCircle(cx, cy, r, mat) {
  for (let y=cy-r; y<=cy+r; y++)
    for (let x=cx-r; x<=cx+r; x++)
      if ((x-cx)**2+(y-cy)**2<=r*r) setV(x,y,S.slice,mat);
}
function drawEllipse(x0, y0, x1, y1, mat) {
  const cx=(x0+x1)/2, cy=(y0+y1)/2;
  const rx=Math.abs(x1-x0)/2, ry=Math.abs(y1-y0)/2;
  if (rx<0.5||ry<0.5){setV(Math.round(cx),Math.round(cy),S.slice,mat);return;}
  for (let y=Math.min(y0,y1); y<=Math.max(y0,y1); y++)
    for (let x=Math.min(x0,x1); x<=Math.max(x0,x1); x++)
      if (((x-cx)/rx)**2+((y-cy)/ry)**2<=1) setV(x,y,S.slice,mat);
}
function floodFill(vx, vy, mat) {
  const target=getV(vx,vy,S.slice);
  if (target===mat) return;
  const q=[[vx,vy]], seen=new Set();
  seen.add(vx*10000+vy);
  while (q.length) {
    const[cx,cy]=q.shift();
    if (getV(cx,cy,S.slice)!==target) continue;
    setV(cx,cy,S.slice,mat);
    for (const[nx,ny] of [[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]]) {
      const k=nx*10000+ny;
      if (inB(nx,ny,S.slice)&&!seen.has(k)){seen.add(k);q.push([nx,ny]);}
    }
  }
}

// ════════════════════════════════════════════════════════════════
//  SLICE CANVAS
// ════════════════════════════════════════════════════════════════
function drawSlice() {
  const cv=document.getElementById('scv');
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height, {RX,RY,slice}=S;
  const cw=W/RX, ch=H/RY;
  ctx.fillStyle='#0d0b16'; ctx.fillRect(0,0,W,H);
  for (let y=0; y<RY; y++) for (let x=0; x<RX; x++)
    if ((x+y)%2===0){ctx.fillStyle='#111019';ctx.fillRect(x*cw,y*ch,cw+.5,ch+.5);}

  // Ghost of Z-1 (onion skin) — helps maintain consistent shape across slices
  // Only below current slice — you already know what's above, you're building upward
  if (slice > 0) {
    ctx.globalAlpha = 0.22;
    for (let y=0; y<RY; y++) for (let x=0; x<RX; x++) {
      const m=getV(x,y,slice-1); if (!m) continue;
      ctx.fillStyle=MAT[m].color;
      ctx.fillRect(x*cw,(RY-1-y)*ch,cw+.5,ch+.5);
    }
    ctx.globalAlpha = 1.0;
  }

  // Current slice — full opacity on top of ghost
  for (let y=0; y<RY; y++) for (let x=0; x<RX; x++) {
    const m=getV(x,y,slice); if (!m) continue;
    ctx.fillStyle=MAT[m].color;
    ctx.fillRect(x*cw,(RY-1-y)*ch,cw+.5,ch+.5);
  }
  if (cw>=3) {
    ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=.5;
    for (let x=0;x<=RX;x++){ctx.beginPath();ctx.moveTo(x*cw,0);ctx.lineTo(x*cw,H);ctx.stroke();}
    for (let y=0;y<=RY;y++){ctx.beginPath();ctx.moveTo(0,y*ch);ctx.lineTo(W,y*ch);ctx.stroke();}
  }
  ctx.strokeStyle='rgba(74,184,200,.25)'; ctx.lineWidth=1.5;
  ctx.strokeRect(1,1,W-2,H-2);
}

// ════════════════════════════════════════════════════════════════
//  OVERLAY — shape preview ghost
// ════════════════════════════════════════════════════════════════
function clearOvr(){document.getElementById('ocv').getContext('2d').clearRect(0,0,99999,99999);}
function drawPreview(x0,y0,x1,y1){
  const oc=document.getElementById('ocv'), ctx=oc.getContext('2d');
  ctx.clearRect(0,0,oc.width,oc.height);
  const {RX,RY,tool,mat,brush}=S, cw=oc.width/RX, ch=oc.height/RY;
  const col=mat?MAT[mat].color:'#ff0000';
  ctx.strokeStyle=col; ctx.fillStyle=col+'33'; ctx.lineWidth=1.5;
  const sy0=RY-1-y0, sy1=RY-1-y1;
  if (tool==='rect'){
    const lx=Math.min(x0,x1)*cw,ly=Math.min(sy0,sy1)*ch;
    const rw=(Math.abs(x1-x0)+1)*cw,rh=(Math.abs(sy1-sy0)+1)*ch;
    ctx.fillRect(lx,ly,rw,rh);ctx.strokeRect(lx,ly,rw,rh);
  } else if (tool==='circle'){
    const r=Math.round(Math.hypot(x1-x0,y1-y0));
    ctx.beginPath();ctx.arc((x0+.5)*cw,(sy0+.5)*ch,r*Math.min(cw,ch),0,Math.PI*2);
    ctx.fill();ctx.stroke();
  } else if (tool==='ellipse'){
    const scx=((x0+x1)/2+.5)*cw;
    const scy=((Math.min(sy0,sy1)+Math.abs(sy1-sy0)/2)+.5)*ch;
    const erx=(Math.abs(x1-x0)/2+.5)*cw,ery=(Math.abs(sy1-sy0)/2+.5)*ch;
    ctx.beginPath();ctx.ellipse(scx,scy,Math.max(erx,.5),Math.max(ery,.5),0,0,Math.PI*2);
    ctx.fill();ctx.stroke();
  } else if (tool==='line'){
    ctx.lineWidth=Math.max(1.5,brush*Math.min(cw,ch));
    ctx.beginPath();ctx.moveTo((x0+.5)*cw,(sy0+.5)*ch);ctx.lineTo((x1+.5)*cw,(sy1+.5)*ch);ctx.stroke();
  }
}

// ════════════════════════════════════════════════════════════════
//  POINTER → VOXEL
// ════════════════════════════════════════════════════════════════
function ptr2vox(e){
  const cv=document.getElementById('ocv'), r=cv.getBoundingClientRect();
  let cx,cy;
  if (e.touches&&e.touches.length){cx=e.touches[0].clientX;cy=e.touches[0].clientY;}
  else if (e.changedTouches&&e.changedTouches.length){cx=e.changedTouches[0].clientX;cy=e.changedTouches[0].clientY;}
  else{cx=e.clientX;cy=e.clientY;}
  return {
    vx:Math.max(0,Math.min(S.RX-1,Math.floor(((cx-r.left)/r.width)*S.RX))),
    vy:Math.max(0,Math.min(S.RY-1,Math.floor((1-(cy-r.top)/r.height)*S.RY))),
  };
}

// ════════════════════════════════════════════════════════════════
//  SLICE CANVAS EVENTS
// ════════════════════════════════════════════════════════════════
function onDown(e){
  e.preventDefault(); S.painting=true;
  const{vx,vy}=ptr2vox(e), mat=S.tool==='erase'?0:S.mat;
  if (S.tool==='draw'||S.tool==='erase'){
    pushHist(); brushAt(vx,vy,mat); S.lastPt={vx,vy}; drawSlice(); drawZMap();
  } else if (S.tool==='fill'){
    pushHist(); floodFill(vx,vy,mat); renderAll();
  } else {
    S.shapeStart={vx,vy};
  }
}
function onMove(e){
  e.preventDefault(); if (!S.painting) return;
  const{vx,vy}=ptr2vox(e), mat=S.tool==='erase'?0:S.mat;
  if (S.tool==='draw'||S.tool==='erase'){
    if (S.lastPt&&(S.lastPt.vx!==vx||S.lastPt.vy!==vy)){
      drawLine(S.lastPt.vx,S.lastPt.vy,vx,vy,mat);
      S.lastPt={vx,vy}; drawSlice();
    }
  } else if (S.shapeStart){
    drawPreview(S.shapeStart.vx,S.shapeStart.vy,vx,vy);
  }
}
function onUp(e){
  if (!S.painting) return;
  S.painting=false;
  if (S.shapeStart){
    const{vx,vy}=ptr2vox(e), mat=S.tool==='erase'?0:S.mat, {vx:x0,vy:y0}=S.shapeStart;
    pushHist();
    if (S.tool==='rect') drawRect(x0,y0,vx,vy,mat);
    else if (S.tool==='circle') drawCircle(x0,y0,Math.round(Math.hypot(vx-x0,vy-y0)),mat);
    else if (S.tool==='ellipse') drawEllipse(x0,y0,vx,vy,mat);
    else if (S.tool==='line') drawLine(x0,y0,vx,vy,mat);
    S.shapeStart=null; clearOvr(); renderAll();
  } else {
    draw3D(); drawZMap();
  }
  S.lastPt=null;
}
function bindSlice(){
  const oc=document.getElementById('ocv');
  oc.addEventListener('mousedown',onDown);
  oc.addEventListener('mousemove',onMove);
  oc.addEventListener('touchstart',onDown,{passive:false});
  oc.addEventListener('touchmove',onMove,{passive:false});
  oc.addEventListener('touchend',onUp,{passive:false});
}
window.addEventListener('mouseup',onUp);

// ════════════════════════════════════════════════════════════════
//  WEBGL2 RAY CASTER
//  DDA (Amanatides & Woo) through a 3D voxel texture.
//  True face normals + Lambertian lighting — no brightness hacks.
// ════════════════════════════════════════════════════════════════

let gl=null, glProg=null, glTex=null, glVAO=null, glUni={};

const VERT_SRC = `#version 300 es
void main(){
  // Full-screen triangle — no vertex buffer needed
  const vec2 V[3] = vec2[3](vec2(-1,-1),vec2(3,-1),vec2(-1,3));
  gl_Position = vec4(V[gl_VertexID],0,1);
}`;

const FRAG_SRC = `#version 300 es
precision highp float;
precision highp int;
precision highp sampler3D;

uniform sampler3D u_tex;   // voxel grid: R8, material index 0-8
uniform vec3  u_res;       // grid dimensions
uniform float u_rotY;
uniform float u_rotX;      // elevation angle, clamped ±π/2      // camera Y rotation
uniform float u_zoom;      // zoom
uniform vec2  u_size;      // canvas pixel size
uniform vec3  u_mats[8];   // material colors, index 1-8 → u_mats[0-7]

out vec4 fragColor;

// Sky / background
const vec3 BG = vec3(0.043,0.039,0.059);

void main(){
  // Screen UV: -0.5..0.5, aspect-corrected
  vec2 uv = (gl_FragCoord.xy / u_size - 0.5);
  uv.x   *= u_size.x / u_size.y;

  // Camera basis — full spherical coordinate camera
  float cY=cos(u_rotY), sY=sin(u_rotY);
  float cX=cos(u_rotX), sX=sin(u_rotX);
  vec3 camFrom = normalize(vec3(sY*cX, sX, cY*cX)); // direction: scene → camera
  vec3 camDir  = -camFrom;                            // direction: camera → scene
  vec3 right   = vec3(cY, 0.0, -sY);                 // horizontal basis (Y-rotation only)
  vec3 up      = normalize(cross(right, camDir));     // vertical basis ✓

  // Orthographic ray
  // Scale: compute the extent of the grid projected onto right and up,
  // then fit whichever axis is more restrictive. Handles tall/narrow canvases.
  float aspect = u_size.x / u_size.y;
  float ext_r  = u_res.x*abs(cY) + u_res.z*abs(sY);
  float ext_u  = dot(abs(up), u_res);
  // need: 0.5*aspect*scale >= ext_r/2  →  scale >= ext_r/aspect
  // need: 0.5*scale >= ext_u/2          →  scale >= ext_u
  float scale  = max(ext_r/aspect, ext_u) * 1.15 / u_zoom;
  vec3  center    = u_res*0.5;
  vec3  rayDir    = camDir;                         // toward scene ✓ (was -camDir — backward!)
  vec3  rayOrigin = center + camFrom*(length(u_res)+6.0)
                  + right*uv.x*scale
                  + up   *uv.y*scale;

  // Ray–AABB intersection (unit voxel grid: 0..u_res)
  vec3 inv  = 1.0/max(abs(rayDir),vec3(1e-7))*sign(rayDir+vec3(1e-10));
  vec3 t0   = -rayOrigin*inv;
  vec3 t1   = (u_res-rayOrigin)*inv;
  vec3 tMn  = min(t0,t1), tMx=max(t0,t1);
  float tEnt= max(max(tMn.x,tMn.y),tMn.z);
  float tExt= min(min(tMx.x,tMx.y),tMx.z);
  if (tEnt>tExt||tExt<0.0){fragColor=vec4(BG,1);return;}

  // DDA initialisation (Amanatides & Woo)
  vec3 pos   = rayOrigin+rayDir*(max(tEnt,0.0)+1e-4);
  ivec3 ipos = ivec3(floor(pos));
  ivec3 stepV= ivec3(sign(rayDir));
  vec3 tDelta= 1.0/max(abs(rayDir),vec3(1e-7));
  vec3 frc   = fract(pos);
  // tMax: distance-in-t to next boundary on each axis
  vec3 tMax  = mix(frc,1.0-frc,greaterThan(stepV,ivec3(0)))*tDelta;

  int face=2, matIdx=0;

  for (int i=0; i<384; i++){
    // Bounds check
    if (any(lessThan(ipos,ivec3(0)))||any(greaterThanEqual(ipos,ivec3(u_res)))) break;
    // Sample voxel (texelFetch: integer coords, no filtering)
    matIdx = int(texelFetch(u_tex,ipos,0).r*255.0+0.5);
    if (matIdx>0) break;
    // Advance to next voxel
    if (tMax.x<tMax.y&&tMax.x<tMax.z){ipos.x+=stepV.x;tMax.x+=tDelta.x;face=0;}
    else if (tMax.y<tMax.z)           {ipos.y+=stepV.y;tMax.y+=tDelta.y;face=1;}
    else                              {ipos.z+=stepV.z;tMax.z+=tDelta.z;face=2;}
    matIdx=0;
  }

  if (matIdx==0){fragColor=vec4(BG,1);return;}

  // Face normal (inward — pointing toward camera)
  vec3 norm=vec3(0);
  if (face==0) norm.x=float(-stepV.x);
  else if (face==1) norm.y=float(-stepV.y);
  else norm.z=float(-stepV.z);

  // Two-light Lambertian
  vec3 L1=normalize(vec3(0.6,1.5,-0.4));
  vec3 L2=normalize(vec3(-0.5,0.4,0.7));
  float d1=max(0.0,dot(norm,L1));
  float d2=max(0.0,dot(norm,L2))*0.25;
  float lit=0.30+d1*0.58+d2;

  // Fetch material color (mat index 1-8 → array index 0-7)
  int mi=clamp(matIdx-1,0,7);
  vec3 col=u_mats[mi]*lit;

  // Subtle gamma
  col=pow(max(col,vec3(0.0)),vec3(1.0/2.2));
  fragColor=vec4(col,1);
}`;

function initGL(){
  const cv = document.getElementById('pcv');
  gl = cv.getContext('webgl2');
  if (!gl) {
    document.getElementById('pvmode').textContent = 'ISO (no WebGL2)';
    return false;
  }

  // Compile helpers
  function shader(type, src){
    const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if (!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
      console.error(type===gl.VERTEX_SHADER?'VS:':'FS:',gl.getShaderInfoLog(s)); return null;
    }
    return s;
  }
  const vs=shader(gl.VERTEX_SHADER,VERT_SRC);
  const fs=shader(gl.FRAGMENT_SHADER,FRAG_SRC);
  if (!vs||!fs) return false;

  glProg=gl.createProgram();
  gl.attachShader(glProg,vs); gl.attachShader(glProg,fs); gl.linkProgram(glProg);
  if (!gl.getProgramParameter(glProg,gl.LINK_STATUS)){
    console.error('Link:',gl.getProgramInfoLog(glProg)); return false;
  }

  // Empty VAO for attribute-less full-screen triangle
  glVAO=gl.createVertexArray(); gl.bindVertexArray(glVAO);

  // 3D voxel texture
  glTex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_3D,glTex);
  gl.texParameteri(gl.TEXTURE_3D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_3D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_3D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_3D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_3D,gl.TEXTURE_WRAP_R,gl.CLAMP_TO_EDGE);

  // Cache uniform locations
  gl.useProgram(glProg);
  for (const n of ['u_tex','u_res','u_rotY','u_rotX','u_zoom','u_size','u_mats[0]'])
    glUni[n]=gl.getUniformLocation(glProg,n);

  uploadVoxTex();
  return true;
}

function uploadVoxTex(){
  if (!gl) return;
  gl.bindTexture(gl.TEXTURE_3D,glTex);
  gl.texImage3D(gl.TEXTURE_3D,0,gl.R8,S.RX,S.RY,S.RZ,0,gl.RED,gl.UNSIGNED_BYTE,S.voxels);
}

function _do3D_gl(){
  const cv=document.getElementById('pcv');
  const W=cv.width, H=cv.height;
  if (!W||!H) return;

  uploadVoxTex();

  gl.viewport(0,0,W,H);
  gl.useProgram(glProg);
  gl.bindVertexArray(glVAO);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_3D,glTex);
  gl.uniform1i(glUni['u_tex'],0);
  gl.uniform3f(glUni['u_res'],S.RX,S.RY,S.RZ);
  gl.uniform1f(glUni['u_rotY'],S.rotY);
  gl.uniform1f(glUni['u_rotX'],S.rotX);
  gl.uniform1f(glUni['u_zoom'],S.zoom);
  gl.uniform2f(glUni['u_size'],W,H);
  gl.uniform1f(glUni['u_slice'],S.slice);

  // Upload material colors (flat Float32Array, 8×3 = 24 floats)
  const mc=new Float32Array(24);
  for (let i=1;i<=8;i++){
    const m=MAT[i]; if (!m||!m.color) continue;
    mc[(i-1)*3  ]=parseInt(m.color.slice(1,3),16)/255;
    mc[(i-1)*3+1]=parseInt(m.color.slice(3,5),16)/255;
    mc[(i-1)*3+2]=parseInt(m.color.slice(5,7),16)/255;
  }
  gl.uniform3fv(glUni['u_mats[0]'],mc);

  gl.drawArrays(gl.TRIANGLES,0,3);
}

// ════════════════════════════════════════════════════════════════
//  CANVAS ISOMETRIC FALLBACK  (if WebGL2 unavailable)
// ════════════════════════════════════════════════════════════════
function adjColor(hex,f){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const k=f>=0?(1+f*0.5):(1+f*0.6);
  return`rgb(${Math.max(0,Math.min(255,r*k|0))},${Math.max(0,Math.min(255,g*k|0))},${Math.max(0,Math.min(255,b*k|0))})`;
}
function _do3D_iso(){
  const cv=document.getElementById('pcv'), ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  if (!W||!H) return;
  ctx.fillStyle='#0b0a0f'; ctx.fillRect(0,0,W,H);
  const {RX,RY,RZ,rotY,zoom}=S;
  const span=Math.max(RX,RY,RZ);
  const CELL=Math.max(2,Math.floor(Math.min(W,H)/(span*2.2)*zoom));
  const OX=W/2, OY=H*0.58, c=Math.cos(rotY), s=Math.sin(rotY);
  function iso(rx,ry,rz){return{sx:(rx-rz)*CELL+OX,sy:((rx+rz)*0.5-ry)*CELL+OY};}
  const vox=[];
  for (let gz=0;gz<RZ;gz++) for (let gy=0;gy<RY;gy++) for (let gx=0;gx<RX;gx++){
    const m=S.voxels[VI(gx,gy,gz)]; if (!m) continue;
    if (getV(gx+1,gy,gz)&&getV(gx-1,gy,gz)&&getV(gx,gy+1,gz)&&
        getV(gx,gy-1,gz)&&getV(gx,gy,gz+1)&&getV(gx,gy,gz-1)) continue;
    const rx=gx*c+gz*s, rz=-gx*s+gz*c;
    vox.push({gx,gy,gz,rx,ry:gy,rz,m});
  }
  const cs=c+s, smc=s-c;
  vox.sort((a,b)=>(a.rx*cs+a.ry+a.rz*smc)-(b.rx*cs+b.ry+b.rz*smc));
  for (const{gx,gy,gz,rx,ry,rz,m} of vox){
    const col=MAT[m].color;
    const P=(dx,dy,dz)=>iso(rx+dx*c+dz*s,ry+dy,rz-dx*s+dz*c);
    const p000=P(0,0,0),p100=P(1,0,0),p010=P(0,1,0),p110=P(1,1,0);
    const p001=P(0,0,1),p101=P(1,0,1),p011=P(0,1,1),p111=P(1,1,1);
    const face=(pts,bright)=>{
      ctx.fillStyle=adjColor(col,bright); ctx.beginPath();
      ctx.moveTo(pts[0].sx,pts[0].sy);
      for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i].sx,pts[i].sy);
      ctx.closePath(); ctx.fill();
    };
    if (!getV(gx,gy+1,gz)) face([p010,p110,p111,p011], 0.30);
    if (!getV(gx-1,gy,gz)) face([p000,p010,p011,p001], 0.10);
    if (!getV(gx,gy,gz-1)) face([p000,p100,p110,p010], 0.15);
    if (!getV(gx+1,gy,gz)) face([p100,p110,p111,p101], 0.00);
    if (!getV(gx,gy,gz+1)) face([p001,p101,p111,p011],-0.20);
    if (!getV(gx,gy-1,gz)) face([p000,p100,p101,p001],-0.40);
  }
}

// ════════════════════════════════════════════════════════════════
//  draw3D — dispatcher
// ════════════════════════════════════════════════════════════════
let _raf=false;
function draw3D(){if (_raf) return; _raf=true; requestAnimationFrame(_do3D);}
function _do3D(){_raf=false; gl?_do3D_gl():_do3D_iso();}
function renderAll(){drawSlice(); draw3D(); drawZMap();}

// ════════════════════════════════════════════════════════════════
//  PREVIEW DRAG + ZOOM
// ════════════════════════════════════════════════════════════════
function initPreview(){
  const cv=document.getElementById('pcv');
  let drag=false, lx=0, ly=0;
  cv.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
  window.addEventListener('mousemove',e=>{
    if (!drag) return;
    S.rotY+=(e.clientX-lx)*0.013; lx=e.clientX;
    S.rotX=Math.max(-Math.PI/2+0.05,Math.min(Math.PI/2-0.05,S.rotX-(e.clientY-ly)*0.013));
    ly=e.clientY;
    draw3D();
  });
  window.addEventListener('mouseup',()=>drag=false);
  cv.addEventListener('wheel',e=>{
    e.preventDefault();
    S.zoom=Math.max(0.3,Math.min(6,S.zoom-e.deltaY*0.001)); draw3D();
  },{passive:false});
  let tlx=0, tly=0;
  cv.addEventListener('touchstart',e=>{drag=true;tlx=e.touches[0].clientX;tly=e.touches[0].clientY;},{passive:true});
  cv.addEventListener('touchmove',e=>{
    if (!drag) return;
    S.rotY+=(e.touches[0].clientX-tlx)*0.013; tlx=e.touches[0].clientX;
    S.rotX=Math.max(-Math.PI/2+0.05,Math.min(Math.PI/2-0.05,S.rotX-(e.touches[0].clientY-tly)*0.013));
    tly=e.touches[0].clientY;
    draw3D();
  },{passive:true});
  cv.addEventListener('touchend',()=>drag=false);
}

// ════════════════════════════════════════════════════════════════
//  Z-MAP  — strip showing which slices have content
// ════════════════════════════════════════════════════════════════
function drawZMap(){
  const cv=document.getElementById('zmap');
  cv.width=S.RZ;
  const ctx=cv.getContext('2d');
  for (let z=0;z<S.RZ;z++){
    let has=false;
    const base=z*S.RX*S.RY, top=base+S.RX*S.RY;
    for (let i=base;i<top;i++){if (S.voxels[i]){has=true;break;}}
    ctx.fillStyle=z===S.slice?'#4ab8c8':(has?'#c89b4a':'#1e1c2c');
    ctx.fillRect(z,0,1,5);
  }
}

// ════════════════════════════════════════════════════════════════
//  UI CONTROLS
// ════════════════════════════════════════════════════════════════
function setTool(t){
  S.tool=t;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));
  document.getElementById('ocv').style.cursor=
    t==='fill'?'cell':t==='erase'?'not-allowed':'crosshair';
}
function setBrush(b){
  S.brush=b;
  document.getElementById('bval').textContent=b;
  document.getElementById('bsl').value=b;
}
function setMat(m){
  S.mat=m;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('active',+b.dataset.mat===m));
}
function setSlice(z){
  S.slice=Math.max(0,Math.min(S.RZ-1,+z));
  _syncZUI(); drawSlice(); draw3D(); drawZMap();
}
function resizeScene(){
  const rx=Math.max(4,Math.min(128,+document.getElementById('rx').value||32));
  const ry=Math.max(4,Math.min(128,+document.getElementById('ry').value||32));
  const rz=Math.max(4,Math.min(128,+document.getElementById('rz').value||32));
  const down=rx<S.RX||ry<S.RY||rz<S.RZ;
  const msg=`Resample ${S.RX}×${S.RY}×${S.RZ} → ${rx}×${ry}×${rz}?`+
    (down?'\n\nDownsampling will lose detail.':'\n\nYour geometry will scale up with the grid.');
  if (!confirm(msg)) return;
  // Nearest-neighbor resample
  const nv=new Uint8Array(rx*ry*rz);
  for (let nz=0;nz<rz;nz++) for (let ny=0;ny<ry;ny++) for (let nx=0;nx<rx;nx++){
    const ox=Math.min(S.RX-1,Math.floor(nx*S.RX/rx));
    const oy=Math.min(S.RY-1,Math.floor(ny*S.RY/ry));
    const oz=Math.min(S.RZ-1,Math.floor(nz*S.RZ/rz));
    nv[nz*rx*ry+ny*rx+nx]=getV(ox,oy,oz);
  }
  S.RX=rx;S.RY=ry;S.RZ=rz;S.voxels=nv;
  S.slice=Math.min(S.slice,rz-1);
  S.history=[nv.slice()];S.hIdx=0;
  _syncZUI(); updUndo(); resizeCvs(); renderAll();
}

function extendZ(extra=8){
  const newRZ=S.RZ+extra;
  if (newRZ>128){alert('Maximum Z resolution is 128.');return;}
  const nv=new Uint8Array(S.RX*S.RY*newRZ);
  nv.set(S.voxels); // existing slices preserved at their Z positions
  S.RZ=newRZ; S.voxels=nv;
  document.getElementById('rz').value=newRZ;
  _syncZUI(); pushHist(); resizeCvs(); renderAll();
}

function _syncZUI(){
  document.getElementById('zsl').max=S.RZ-1;
  document.getElementById('zsl').value=S.slice;
  document.getElementById('zval').textContent=`${S.slice} / ${S.RZ-1}`;
}

function newScene(){
  const rx=Math.max(4,Math.min(128,+document.getElementById('rx').value||32));
  const ry=Math.max(4,Math.min(128,+document.getElementById('ry').value||32));
  const rz=Math.max(4,Math.min(128,+document.getElementById('rz').value||32));
  if (S.voxels&&S.voxels.some(v=>v!==0))
    if (!confirm('Clear current model and resize?')) return;
  S.RX=rx;S.RY=ry;S.RZ=rz;
  S.voxels=new Uint8Array(rx*ry*rz);
  S.slice=0; S.history=[]; S.hIdx=-1; S.name='';
  document.getElementById('model-name').value='';
  document.getElementById('zsl').max=rz-1;
  document.getElementById('zsl').value=0;
  document.getElementById('zval').textContent=`0 / ${rz-1}`;
  updUndo(); resizeCvs(); pushHist(); renderAll();
}

// ════════════════════════════════════════════════════════════════
//  MATERIAL PALETTE — with inline color picker + name editor
// ════════════════════════════════════════════════════════════════
function buildPalette(){
  const list=document.getElementById('mlist');
  list.innerHTML='';
  MAT.slice(1).forEach((m,i)=>{
    const idx=i+1;
    const btn=document.createElement('div');
    btn.className='mbtn'+(idx===S.mat?' active':'');
    btn.dataset.mat=idx;
    // Clicking the whole row selects material (but color input and name input stop propagation)
    btn.addEventListener('click',()=>setMat(idx));

    const row=document.createElement('div');
    row.className='mbtn-row';

    // Color swatch = label wrapping a hidden color input
    const lbl=document.createElement('label');
    lbl.className='msw-label';
    lbl.title='Click to recolor';
    const swatch=document.createElement('div');
    swatch.className='msw';
    swatch.style.background=m.color;
    swatch.id=`sw-${idx}`;
    const cpick=document.createElement('input');
    cpick.type='color'; cpick.className='msw-input'; cpick.value=m.color;
    cpick.addEventListener('click',e=>e.stopPropagation());
    cpick.addEventListener('input',e=>{
      MAT[idx].color=e.target.value;
      document.getElementById(`sw-${idx}`).style.background=e.target.value;
      drawSlice(); draw3D();
    });
    lbl.appendChild(swatch); lbl.appendChild(cpick);

    // Name input
    const info=document.createElement('div');
    info.className='minfo';
    const nameIn=document.createElement('input');
    nameIn.type='text'; nameIn.className='mname-in'; nameIn.value=m.name;
    nameIn.title='Click to rename';
    nameIn.addEventListener('click',e=>e.stopPropagation());
    nameIn.addEventListener('change',e=>{MAT[idx].name=e.target.value.trim()||MAT[idx].name;});
    const densDiv=document.createElement('div');
    densDiv.className='mdens'; densDiv.textContent=`${m.density} g/cm³`;

    info.appendChild(nameIn); info.appendChild(densDiv);
    row.appendChild(lbl); row.appendChild(info);
    btn.appendChild(row);
    list.appendChild(btn);
  });
}

// ════════════════════════════════════════════════════════════════
//  EXPORT / IMPORT  .soli
// ════════════════════════════════════════════════════════════════
function exportSoli(){
  const raw  = document.getElementById('model-name').value.trim();
  const name = raw || 'untitled';
  const slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

  // Compute center of mass (density-weighted) and shift to grid center on export
  let totalMass=0, comX=0, comY=0, comZ=0;
  for (let z=0;z<S.RZ;z++) for (let y=0;y<S.RY;y++) for (let x=0;x<S.RX;x++){
    const m=getV(x,y,z); if (!m) continue;
    const d=MAT[m].density||1;
    totalMass+=d; comX+=x*d; comY+=y*d; comZ+=z*d;
  }
  let exportVox=S.voxels, offsetX=0, offsetY=0, offsetZ=0;
  if (totalMass>0){
    offsetX=Math.round(S.RX/2-comX/totalMass);
    offsetY=Math.round(S.RY/2-comY/totalMass);
    offsetZ=Math.round(S.RZ/2-comZ/totalMass);
    if (offsetX!==0||offsetY!==0||offsetZ!==0){
      const nv=new Uint8Array(S.RX*S.RY*S.RZ);
      for (let z=0;z<S.RZ;z++) for (let y=0;y<S.RY;y++) for (let x=0;x<S.RX;x++){
        const m=getV(x,y,z); if (!m) continue;
        const nx=x+offsetX, ny=y+offsetY, nz=z+offsetZ;
        if (inB(nx,ny,nz)) nv[VI(nx,ny,nz)]=m;
      }
      exportVox=nv;
    }
  }

  let bin=''; const chunk=4096;
  for (let i=0;i<exportVox.length;i+=chunk)
    bin+=String.fromCharCode(...exportVox.subarray(i,i+chunk));
  const data={
    magic:'SOLI', version:'0.1',
    name,
    resolution:{x:S.RX,y:S.RY,z:S.RZ},
    center_offset:{x:offsetX,y:offsetY,z:offsetZ},
    materials:MAT.map(m=>({name:m.name,density:m.density,elasticity:m.elast,color:m.color})),
    voxels:btoa(bin),
  };
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/octet-stream'}));
  a.download=`${slug}.soli`;
  a.click(); URL.revokeObjectURL(a.href);
}
function importSoli(){document.getElementById('file-in').click();}
function loadSoli(e){
  const f=e.target.files[0]; if (!f) return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if (d.magic!=='SOLI'){alert('Not a valid .soli file.');return;}
      S.RX=d.resolution.x;S.RY=d.resolution.y;S.RZ=d.resolution.z;
      S.voxels=new Uint8Array(S.RX*S.RY*S.RZ);
      const dec=atob(d.voxels);
      for (let i=0;i<dec.length;i++) S.voxels[i]=dec.charCodeAt(i);
      if (d.name) {
        document.getElementById('model-name').value = d.name;
        S.name = d.name;
      }
      if (d.materials){
        d.materials.forEach((m,i)=>{
          if (i>0&&i<MAT.length){
            if (m.name) MAT[i].name=m.name;
            if (m.color) MAT[i].color=m.color;
          }
        });
      }
      S.slice=0;
      document.getElementById('rx').value=S.RX;
      document.getElementById('ry').value=S.RY;
      document.getElementById('rz').value=S.RZ;
      document.getElementById('zsl').max=S.RZ-1;
      document.getElementById('zsl').value=0;
      document.getElementById('zval').textContent=`0 / ${S.RZ-1}`;
      S.history=[S.voxels.slice()];S.hIdx=0;
      updUndo(); buildPalette(); resizeCvs(); renderAll();
    }catch(err){alert('Load failed: '+err.message);}
  };
  rd.readAsText(f); e.target.value='';
}

// ════════════════════════════════════════════════════════════════
//  CANVAS SIZING
// ════════════════════════════════════════════════════════════════
function resizeCvs(){
  const wrap=document.getElementById('swrap');
  const W=wrap.clientWidth-24, H=wrap.clientHeight-24;
  const size=Math.max(64,Math.min(W,H,700));
  for (const id of['scv','ocv']){
    const cv=document.getElementById(id);
    cv.width=size; cv.height=size;
    cv.style.width=size+'px'; cv.style.height=size+'px';
  }
  // Preview canvas: read actual rendered size from CSS
  const pcv=document.getElementById('pcv');
  const pw=Math.max(64,pcv.offsetWidth||272);
  const ph=Math.max(64,pcv.offsetHeight||400);
  pcv.width=pw; pcv.height=ph;
  // Sync WebGL canvas size
  if (gl){gl.canvas.width=pw;gl.canvas.height=ph;}
  drawSlice(); draw3D(); drawZMap();
}

// ════════════════════════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if (e.ctrlKey||e.metaKey){
    if (e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return;}
    if (e.key==='z'&&e.shiftKey||e.key==='y'){e.preventDefault();redo();return;}
  }
  if (e.target.tagName==='INPUT') return;
  if (e.key==='[') setBrush(Math.max(1,S.brush-1));
  if (e.key===']') setBrush(Math.min(16,S.brush+1));
  if (e.key==='ArrowUp'||e.key==='.') zStep(1);
  if (e.key==='ArrowDown'||e.key===',') zStep(-1);
  const tools={d:'draw',e:'erase',r:'rect',c:'circle',l:'line',f:'fill'};
  if (tools[e.key]) setTool(tools[e.key]);
});

// ════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════
function init(){
  buildPalette();
  pushHist();
  bindSlice();
  initPreview();

  const glOk=initGL();
  if (!glOk){
    // Canvas 2D ISO fallback
    document.getElementById('pvmode').textContent='ISO · DRAG ROTATE · SCROLL ZOOM';
  }

  const ro=new ResizeObserver(resizeCvs);
  ro.observe(document.getElementById('swrap'));
  ro.observe(document.getElementById('preview'));

  resizeCvs();
  renderAll();
}

init();
</script>
